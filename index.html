<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutomotoraGV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.navbar{background:#1e293b;padding:12px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #334155;position:sticky;top:0;z-index:100}
.navbar h1{font-size:1.2rem;color:#38bdf8;font-weight:700}
.nav-links{display:flex;gap:8px;margin-left:auto}
.nav-links a{color:#94a3b8;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:.9rem;cursor:pointer}
.nav-links a:hover,.nav-links a.active{background:#334155;color:#e2e8f0}
.main{padding:24px;max-width:1400px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;text-align:center}
.card .num{font-size:2rem;font-weight:700;color:#38bdf8}
.card .label{color:#94a3b8;font-size:.9rem;margin-top:4px}
table{width:100%;border-collapse:collapse;background:#1e293b;border-radius:12px;overflow:hidden}
th{background:#334155;padding:12px 16px;text-align:left;font-size:.85rem;color:#94a3b8;font-weight:600}
td{padding:10px 16px;border-bottom:1px solid #0f172a;font-size:.9rem}
tr:hover td{background:#334155}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-green{background:#064e3b;color:#34d399}
.badge-blue{background:#1e3a5f;color:#60a5fa}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600}
.btn-primary{background:#0ea5e9;color:#fff}
.btn-sm{padding:4px 10px;font-size:.8rem}
.search-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input,.search-bar select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:8px 12px;border-radius:8px;font-size:.9rem;flex:1;min-width:150px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-box h3{margin-bottom:16px;color:#38bdf8}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.85rem;color:#94a3b8;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:8px 12px;border-radius:8px;font-size:.9rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:340px}
.login-box h2{text-align:center;color:#38bdf8;margin-bottom:24px}
.section{display:none}
.section.active{display:block}
.page-title{font-size:1.4rem;font-weight:700;margin-bottom:20px;color:#f1f5f9}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <h2>AutomotoraGV</h2>
    <div class="form-group"><label>Usuario</label><input type="text" id="login-user" placeholder="usuario"></div>
    <div class="form-group"><label>Contrasena</label><input type="password" id="login-pass" placeholder="contrasena"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" id="btn-login">Ingresar</button>
    <p id="login-err" style="color:#f87171;text-align:center;margin-top:8px;font-size:.85rem"></p>
  </div>
</div>
<div id="app" style="display:none">
  <nav class="navbar">
    <h1>AutomotoraGV</h1>
    <div class="nav-links">
      <a id="nav-dashboard">Dashboard</a>
      <a id="nav-vehiculos">Vehiculos</a>
      <a id="nav-clientes">Clientes</a>
      <a id="nav-ventas">Ventas</a>
      <a id="btn-logout" style="color:#f87171">Salir</a>
    </div>
  </nav>
  <div class="main">
    <div id="sec-dashboard" class="section"><p class="page-title">Dashboard</p><div class="cards" id="dash-cards"></div></div>
    <div id="sec-vehiculos" class="section">
      <p class="page-title">Vehiculos</p>
      <div class="search-bar">
        <input id="v-search" placeholder="Buscar marca, modelo, chasis...">
        <select id="v-estado"><option value="">Todos</option><option value="stock">En stock</option><option value="vendido">Vendidos</option></select>
        <button class="btn btn-primary" id="btn-add-vehiculo">+ Agregar</button>
      </div>
      <table><thead><tr><th>Marca</th><th>Modelo</th><th>Ano</th><th>Chasis</th><th>Motor</th><th>KM</th><th>Precio</th><th>Estado</th><th>Proveedor</th><th></th></tr></thead><tbody id="vehiculos-tbody"></tbody></table>
    </div>
    <div id="sec-clientes" class="section">
      <p class="page-title">Clientes</p>
      <div class="search-bar"><input id="c-search" placeholder="Buscar cliente..."><button class="btn btn-primary" id="btn-add-cliente">+ Agregar</button></div>
      <table><thead><tr><th>Nombre</th><th>Documento</th><th>Telefono</th><th>Email</th><th>Ciudad</th><th></th></tr></thead><tbody id="clientes-tbody"></tbody></table>
    </div>
    <div id="sec-ventas" class="section">
      <p class="page-title">Ventas</p>
      <div class="search-bar"><button class="btn btn-primary" id="btn-add-venta">+ Nueva venta</button></div>
      <table><thead><tr><th>Fecha</th><th>Vehiculo</th><th>Cliente</th><th>Precio</th></tr></thead><tbody id="ventas-tbody"></tbody></table>
    </div>
  </div>
</div>
<div class="modal" id="modal-vehiculo">
  <div class="modal-box">
    <h3 id="mv-title">Agregar Vehiculo</h3>
    <div class="form-row"><div class="form-group"><label>Marca</label><input id="mv-marca"></div><div class="form-group"><label>Modelo</label><input id="mv-modelo"></div></div>
    <div class="form-row"><div class="form-group"><label>Ano</label><input id="mv-anio" type="number"></div><div class="form-group"><label>Color</label><input id="mv-color"></div></div>
    <div class="form-row"><div class="form-group"><label>N Motor</label><input id="mv-motor"></div><div class="form-group"><label>N Chasis</label><input id="mv-chasis"></div></div>
    <div class="form-row"><div class="form-group"><label>KM</label><input id="mv-km" type="number"></div><div class="form-group"><label>Proveedor</label><input id="mv-proveedor"></div></div>
    <div class="form-row"><div class="form-group"><label>Precio Compra</label><input id="mv-pcompra" type="number"></div><div class="form-group"><label>Precio Venta</label><input id="mv-pventa" type="number"></div></div>
    <div class="form-group"><label>Fecha Compra</label><input id="mv-fcompra" type="date"></div>
    <div class="form-group"><label>Notas</label><textarea id="mv-notas" rows="2"></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn" id="btn-cancel-vehiculo" style="background:#334155">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-vehiculo">Guardar</button>
    </div>
  </div>
</div>
<div class="modal" id="modal-cliente">
  <div class="modal-box">
    <h3>Cliente</h3>
    <div class="form-group"><label>Nombre completo</label><input id="mc-nombre"></div>
    <div class="form-row"><div class="form-group"><label>Documento</label><input id="mc-doc"></div><div class="form-group"><label>Telefono</label><input id="mc-tel"></div></div>
    <div class="form-row"><div class="form-group"><label>Email</label><input id="mc-email"></div><div class="form-group"><label>Ciudad</label><input id="mc-ciudad"></div></div>
    <div class="form-group"><label>Direccion</label><input id="mc-dir"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn" id="btn-cancel-cliente" style="background:#334155">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-cliente">Guardar</button>
    </div>
  </div>
</div>
<div class="modal" id="modal-venta">
  <div class="modal-box">
    <h3>Nueva Venta</h3>
    <div class="form-group"><label>Vehiculo (en stock)</label><select id="mv2-vehiculo"></select></div>
    <div class="form-group"><label>Cliente</label><select id="mv2-cliente"></select></div>
    <div class="form-row"><div class="form-group"><label>Precio</label><input id="mv2-precio" type="number"></div><div class="form-group"><label>Fecha</label><input id="mv2-fecha" type="date"></div></div>
    <div class="form-group"><label>Notas</label><textarea id="mv2-notas" rows="2"></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn" id="btn-cancel-venta" style="background:#334155">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-venta">Registrar</button>
    </div>
  </div>
</div>
<script>
var eVI=null,eCI=null;
function gT(){return sessionStorage.getItem('gv_token')}
function sT(t){sessionStorage.setItem('gv_token',t)}
function cT(){sessionStorage.removeItem('gv_token')}
function api(path,method,body){
  method=method||'GET';
  var o={method:method,headers:{'Content-Type':'application/json'}};
  var t=gT();if(t)o.headers['Authorization']='Bearer '+t;
  if(body)o.body=JSON.stringify(body);
  return fetch(path,o).then(function(r){return r.json()});
}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';showSection('dashboard')}
function showSection(n){
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  document.getElementById('sec-'+n).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(function(a){a.classList.remove('active')});
  var nav=document.getElementById('nav-'+n);if(nav)nav.classList.add('active');
  if(n==='dashboard')loadDashboard();
  if(n==='vehiculos')loadVehiculos();
  if(n==='clientes')loadClientes();
  if(n==='ventas')loadVentas();
}
function loadDashboard(){
  api('/api/dashboard').then(function(d){
    document.getElementById('dash-cards').innerHTML=
      '<div class="card"><div class="num">'+(d.stock||0)+'</div><div class="label">En Stock</div></div>'+
      '<div class="card"><div class="num">'+(d.vendidos||0)+'</div><div class="label">Vendidos</div></div>'+
      '<div class="card"><div class="num">'+(d.clientes||0)+'</div><div class="label">Clientes</div></div>'+
      '<div class="card"><div class="num">$'+(d.ventas_total||0).toLocaleString()+'</div><div class="label">Total Ventas</div></div>';
  });
}
function loadVehiculos(){
  var q=document.getElementById('v-search').value,e=document.getElementById('v-estado').value;
  api('/api/vehiculos?q='+encodeURIComponent(q)+'&estado='+e).then(function(data){
    var rows=(data.items||[]).map(function(v){
      var b=v.estado==='stock'?'badge-green':'badge-blue';
      return '<tr><td>'+(v.marca||'')+'</td><td>'+(v.modelo||'')+'</td><td>'+(v.anio||'')+'</td><td>'+(v.chasis||'-')+'</td><td>'+(v.motor||'-')+'</td><td>'+(v.km||0).toLocaleString()+'</td><td>$'+(v.precio_venta||0).toLocaleString()+'</td><td><span class="badge '+b+'">'+v.estado+'</span></td><td>'+(v.proveedor||'-')+'</td><td><button class="btn btn-primary btn-sm" data-v=''+JSON.stringify(v).replace(/'/g,"&#39;")+ '' onclick="editVehiculoBtn(this)">Editar</button></td></tr>';
    });
    document.getElementById('vehiculos-tbody').innerHTML=rows.join('')||'<tr><td colspan="10" style="text-align:center;color:#64748b;padding:24px">Sin registros</td></tr>';
  });
}
function editVehiculoBtn(b){editVehiculo(JSON.parse(b.getAttribute('data-v')))}
function loadClientes(){
  var q=document.getElementById('c-search').value;
  api('/api/clientes?q='+encodeURIComponent(q)).then(function(data){
    var rows=(data.items||[]).map(function(c){
      var tel=c.telefono?'<a href="tel:'+c.telefono+'" style="color:#34d399">'+c.telefono+'</a>':'-';
      return '<tr><td>'+c.nombre+'</td><td><span class="badge badge-blue">'+(c.documento||'-')+'</span></td><td>'+tel+'</td><td>'+(c.email||'-')+'</td><td>'+(c.ciudad||'-')+'</td><td><button class="btn btn-primary btn-sm" data-c=''+JSON.stringify(c).replace(/'/g,"&#39;")+'' onclick="editClienteBtn(this)">Editar</button></td></tr>';
    });
    document.getElementById('clientes-tbody').innerHTML=rows.join('')||'<tr><td colspan="6" style="text-align:center;color:#64748b;padding:24px">Sin registros</td></tr>';
  });
}
function editClienteBtn(b){editCliente(JSON.parse(b.getAttribute('data-c')))}
function loadVentas(){
  api('/api/ventas').then(function(data){
    var rows=(data.items||[]).map(function(v){return '<tr><td>'+(v.fecha||'')+'</td><td>'+(v.marca||'')+' '+(v.modelo||'')+'</td><td>'+(v.cliente||'')+'</td><td>$'+(v.precio||0).toLocaleString()+'</td></tr>'});
    document.getElementById('ventas-tbody').innerHTML=rows.join('')||'<tr><td colspan="4" style="text-align:center;color:#64748b;padding:24px">Sin ventas</td></tr>';
  });
}
function openVehiculoModal(){eVI=null;document.getElementById('mv-title').textContent='Agregar Vehiculo';['marca','modelo','anio','color','motor','chasis','km','proveedor','pcompra','pventa','fcompra','notas'].forEach(function(f){var e=document.getElementById('mv-'+f);if(e)e.value=''});document.getElementById('modal-vehiculo').classList.add('open')}
function editVehiculo(v){eVI=v.id;document.getElementById('mv-title').textContent='Editar Vehiculo';document.getElementById('mv-marca').value=v.marca||'';document.getElementById('mv-modelo').value=v.modelo||'';document.getElementById('mv-anio').value=v.anio||'';document.getElementById('mv-color').value=v.color||'';document.getElementById('mv-motor').value=v.motor||'';document.getElementById('mv-chasis').value=v.chasis||'';document.getElementById('mv-km').value=v.km||0;document.getElementById('mv-proveedor').value=v.proveedor||'';document.getElementById('mv-pcompra').value=v.precio_compra||0;document.getElementById('mv-pventa').value=v.precio_venta||0;document.getElementById('mv-fcompra').value=v.fecha_compra||'';document.getElementById('mv-notas').value=v.notas||'';document.getElementById('modal-vehiculo').classList.add('open')}
function saveVehiculo(){var b={marca:document.getElementById('mv-marca').value,modelo:document.getElementById('mv-modelo').value,anio:document.getElementById('mv-anio').value,color:document.getElementById('mv-color').value,motor:document.getElementById('mv-motor').value,chasis:document.getElementById('mv-chasis').value,km:document.getElementById('mv-km').value,proveedor:document.getElementById('mv-proveedor').value,precio_compra:document.getElementById('mv-pcompra').value,precio_venta:document.getElementById('mv-pventa').value,fecha_compra:document.getElementById('mv-fcompra').value,notas:document.getElementById('mv-notas').value};api(eVI?'/api/vehiculos/'+eVI:'/api/vehiculos',eVI?'PUT':'POST',b).then(function(){document.getElementById('modal-vehiculo').classList.remove('open');loadVehiculos()})}
function openClienteModal(){eCI=null;['nombre','doc','tel','email','ciudad','dir'].forEach(function(f){document.getElementById('mc-'+f).value=''});document.getElementById('modal-cliente').classList.add('open')}
function editCliente(c){eCI=c.id;document.getElementById('mc-nombre').value=c.nombre||'';document.getElementById('mc-doc').value=c.documento||'';document.getElementById('mc-tel').value=c.telefono||'';document.getElementById('mc-email').value=c.email||'';document.getElementById('mc-ciudad').value=c.ciudad||'';document.getElementById('mc-dir').value=c.direccion||'';document.getElementById('modal-cliente').classList.add('open')}
function saveCliente(){var b={nombre:document.getElementById('mc-nombre').value,documento:document.getElementById('mc-doc').value,telefono:document.getElementById('mc-tel').value,email:document.getElementById('mc-email').value,ciudad:document.getElementById('mc-ciudad').value,direccion:document.getElementById('mc-dir').value};api(eCI?'/api/clientes/'+eCI:'/api/clientes',eCI?'PUT':'POST',b).then(function(){document.getElementById('modal-cliente').classList.remove('open');loadClientes()})}
function openVentaModal(){Promise.all([api('/api/vehiculos?estado=stock&q='),api('/api/clientes?q=')]).then(function(r){var vs=r[0].items||[],cs=r[1].items||[];document.getElementById('mv2-vehiculo').innerHTML=vs.map(function(v){return'<option value="'+v.id+'">'+v.marca+' '+v.modelo+' ('+v.anio+')</option>'}).join('');document.getElementById('mv2-cliente').innerHTML=cs.map(function(c){return'<option value="'+c.id+'">'+c.nombre+'</option>'}).join('');document.getElementById('mv2-precio').value='';document.getElementById('mv2-fecha').value=new Date().toISOString().split('T')[0];document.getElementById('mv2-notas').value='';document.getElementById('modal-venta').classList.add('open')})}
function saveVenta(){api('/api/ventas','POST',{vehiculo_id:document.getElementById('mv2-vehiculo').value,cliente_id:document.getElementById('mv2-cliente').value,precio:document.getElementById('mv2-precio').value,fecha:document.getElementById('mv2-fecha').value,notas:document.getElementById('mv2-notas').value}).then(function(){document.getElementById('modal-venta').classList.remove('open');loadVentas()})}
document.getElementById('btn-login').addEventListener('click',function(){var u=document.getElementById('login-user').value,p=document.getElementById('login-pass').value;api('/api/login','POST',{username:u,password:p}).then(function(res){if(res.ok&&res.token){sT(res.token);showApp()}else{document.getElementById('login-err').textContent=res.error||'Error al ingresar'}})});
document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('btn-login').click()});
document.getElementById('btn-logout').addEventListener('click',function(){cT();location.reload()});
document.getElementById('nav-dashboard').addEventListener('click',function(){showSection('dashboard')});
document.getElementById('nav-vehiculos').addEventListener('click',function(){showSection('vehiculos')});
document.getElementById('nav-clientes').addEventListener('click',function(){showSection('clientes')});
document.getElementById('nav-ventas').addEventListener('click',function(){showSection('ventas')});
document.getElementById('btn-add-vehiculo').addEventListener('click',openVehiculoModal);
document.getElementById('btn-cancel-vehiculo').addEventListener('click',function(){document.getElementById('modal-vehiculo').classList.remove('open')});
document.getElementById('btn-save-vehiculo').addEventListener('click',saveVehiculo);
document.getElementById('btn-add-cliente').addEventListener('click',openClienteModal);
document.getElementById('btn-cancel-cliente').addEventListener('click',function(){document.getElementById('modal-cliente').classList.remove('open')});
document.getElementById('btn-save-cliente').addEventListener('click',saveCliente);
document.getElementById('btn-add-venta').addEventListener('click',openVentaModal);
document.getElementById('btn-cancel-venta').addEventListener('click',function(){document.getElementById('modal-venta').classList.remove('open')});
document.getElementById('btn-save-venta').addEventListener('click',saveVenta);
document.getElementById('v-search').addEventListener('input',loadVehiculos);
document.getElementById('v-estado').addEventListener('change',loadVehiculos);
document.getElementById('c-search').addEventListener('input',loadClientes);
var et=gT();if(et){api('/api/me').then(function(res){if(res.username){showApp()}else{cT()}})}
</script>
</body>
</html>
