<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AutomotoraGV</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--blue:#1A6FB5;--blue2:#2589D8;--blueL:#E8F4FD;--blueLL:#F0F8FF;--accent:#0D5A96;--gray:#5A6A7A;--grayL:#F5F8FA;--border:#D0E4F0;--white:#FFFFFF;--text:#1A2B3C;--red:#D94040;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--grayL);color:var(--text);min-height:100vh}
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1A6FB5 0%,#2589D8 50%,#0D5A96 100%);z-index:999}
.login-box{background:#fff;border-radius:20px;padding:48px 40px;width:380px;box-shadow:0 24px 60px rgba(0,0,0,.18)}
.login-logo{font-family:'DM Serif Display',serif;font-size:28px;color:var(--blue);text-align:center;margin-bottom:6px}
.login-sub{text-align:center;color:var(--gray);font-size:13px;margin-bottom:32px}
.login-box label{display:block;font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.login-box input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;color:var(--text);background:var(--blueLL);margin-bottom:18px;transition:border .2s}
.login-box input:focus{outline:none;border-color:var(--blue2);background:#fff}
.btn-login{width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s}
.btn-login:hover{background:var(--accent)}
#login-err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:18px}
#app{display:none;min-height:100vh}
.topbar{background:#fff;border-bottom:1.5px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(26,111,181,.07)}
.topbar-brand{font-family:'DM Serif Display',serif;font-size:22px;color:var(--blue)}
.topbar-brand span{color:var(--blue2)}
.topbar-nav{display:flex;gap:4px}
.nav-btn{background:none;border:none;font-family:inherit;font-size:14px;font-weight:500;color:var(--gray);padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .18s}
.nav-btn:hover{background:var(--blueL);color:var(--blue)}
.nav-btn.active{background:var(--blue);color:#fff}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--gray)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
.btn-salir{background:none;border:1.5px solid var(--border);color:var(--gray);font-family:inherit;font-size:12px;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .18s}
.btn-salir:hover{border-color:var(--red);color:var(--red)}
.main{padding:32px;max-width:1400px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:16px;padding:28px 24px;border:1.5px solid var(--border);display:flex;align-items:center;gap:18px;box-shadow:0 2px 12px rgba(26,111,181,.06);transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,111,181,.12)}
.stat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;color:#fff}
.stat-icon.comp{background:var(--blue)}
.stat-icon.vent{background:#0E9E6E}
.stat-icon.cli{background:#E8A020}
.stat-num{font-size:36px;font-weight:600;color:var(--text);line-height:1}
.stat-label{font-size:12px;color:var(--gray);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.section{display:none}
.section.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text)}
.section-count{font-size:13px;color:var(--gray);margin-top:2px}
.search-bar{margin-bottom:16px}
.search-bar input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 16px;font-size:14px;font-family:inherit;background:#fff;transition:border .2s}
.search-bar input:focus{outline:none;border-color:var(--blue2)}
.table-wrap{background:#fff;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 12px rgba(26,111,181,.05)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--blueLL);border-bottom:2px solid var(--border)}
thead th{padding:13px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.07em}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--blueLL)}
tbody td{padding:12px 16px;font-size:13px;color:var(--text)}
.mono{font-family:monospace;font-size:12px;color:var(--gray)}
.price{font-weight:600;color:var(--blue)}
.empty-row td{text-align:center;padding:48px;color:var(--gray);font-size:14px;cursor:default}
.cell-cut{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--gray);font-size:12px}
.badge-ci{background:#E8F4FD;color:var(--blue);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600}
.badge-rut{background:#FDF4E8;color:#A06010;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600}
.badge-pas{background:#F0F4FD;color:#4060A0;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1.5px solid var(--border);font-size:13px;color:var(--gray)}
.page-btns{display:flex;gap:4px}
.page-btn{background:none;border:1.5px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.page-btn:hover:not(:disabled){background:var(--blueL);border-color:var(--blue2);color:var(--blue)}
.page-btn:disabled{opacity:.4;cursor:default}
.page-btn.active-pg{background:var(--blue);border-color:var(--blue);color:#fff}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:32px;max-width:560px;width:92%;box-shadow:0 24px 60px rgba(0,0,0,.2);position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray)}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--blue);margin-bottom:20px;padding-right:30px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px}
.modal-field label{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.06em}
.modal-field p{font-size:14px;color:var(--text);margin-top:3px;word-break:break-all}
.modal-field.full{grid-column:1/-1}
.modal-detalle{background:var(--blueLL);border-radius:8px;padding:12px;font-size:12px;color:var(--gray);line-height:1.6;word-break:break-all;border:1px solid var(--border)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">AutomotoraGV</div>
    <div class="login-sub">Sistema de gestion vehicular</div>
    <label>Usuario</label>
    <input type="text" id="inp-user" placeholder="usuario">
    <label>Contrasena</label>
    <input type="password" id="inp-pass" placeholder="contrasena">
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div id="login-err"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">Automoto<span>ra</span>GV</div>
    <div class="topbar-nav">
      <button class="nav-btn active" id="nav-dashboard" onclick="showSection('dashboard',this)">Dashboard</button>
      <button class="nav-btn" id="nav-compras" onclick="showSection('compras',this)">Compras</button>
      <button class="nav-btn" id="nav-ventas" onclick="showSection('ventas',this)">Ventas</button>
      <button class="nav-btn" id="nav-clientes" onclick="showSection('clientes',this)">Clientes</button>
    </div>
    <div class="topbar-user">
      <div class="user-avatar" id="user-initial">?</div>
      <span id="user-label">-</span>
      <button class="btn-salir" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="main">

    <div class="section active" id="section-dashboard">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon comp">C</div><div><div class="stat-num" id="stat-comprados">-</div><div class="stat-label">Compras</div></div></div>
        <div class="stat-card"><div class="stat-icon vent">V</div><div><div class="stat-num" id="stat-vendidos">-</div><div class="stat-label">Ventas</div></div></div>
        <div class="stat-card"><div class="stat-icon cli">CL</div><div><div class="stat-num" id="stat-clientes">-</div><div class="stat-label">Clientes</div></div></div>
      </div>
    </div>

    <div class="section" id="section-compras">
      <div class="section-header"><div><div class="section-title">Compras</div><div class="section-count" id="count-compras"></div></div></div>
      <div class="search-bar"><input type="text" id="search-compras" placeholder="Buscar por proveedor, comprobante, modelo, chasis..." oninput="filterC()"></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Fecha</th><th>Proveedor</th><th>Comprobante</th><th>Marca / Modelo</th><th>Anio</th><th>Chasis</th><th>Color</th><th>Precio USD</th></tr></thead>
          <tbody id="tbody-compras"></tbody>
        </table>
        <div class="pagination" id="pag-compras"></div>
      </div>
    </div>

    <div class="section" id="section-ventas">
      <div class="section-header"><div><div class="section-title">Ventas</div><div class="section-count" id="count-ventas"></div></div></div>
      <div class="search-bar"><input type="text" id="search-ventas" placeholder="Buscar por cliente, detalle..." oninput="filterV()"></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Fecha</th><th>Cliente</th><th>Comprobante</th><th>Marca / Modelo</th><th>Chasis</th><th>Precio USD</th></tr></thead>
          <tbody id="tbody-ventas"></tbody>
        </table>
        <div class="pagination" id="pag-ventas"></div>
      </div>
    </div>

    <div class="section" id="section-clientes">
      <div class="section-header"><div><div class="section-title">Clientes</div><div class="section-count" id="count-clientes"></div></div></div>
      <div class="search-bar"><input type="text" id="search-clientes" placeholder="Buscar por nombre, documento..." oninput="filterL()"></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>Tipo Doc</th><th>Documento</th><th>Telefono</th><th>Email</th><th>Pais</th></tr></thead>
          <tbody id="tbody-clientes"></tbody>
        </table>
        <div class="pagination" id="pag-clientes"></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-grid" id="modal-body"></div>
  </div>
</div>

<script>
const PS=50;
let TOK=localStorage.getItem('gv_tok')||'';
let allC=[],allV=[],allL=[],fC=[],fV=[],fL=[],pC=1,pV=1,pL=1;

async function api(path,opts){
  try{
    const r=await fetch(path,{...opts,headers:{'Authorization':'Bearer '+TOK,'Content-Type':'application/json',...((opts&&opts.headers)||{})}});
    if(r.status===401){doLogout();return null;}
    return await r.json();
  }catch(e){return null;}
}

async function doLogin(){
  const u=document.getElementById('inp-user').value.trim();
  const p=document.getElementById('inp-pass').value;
  const err=document.getElementById('login-err');
  err.textContent='';
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:u,password:p})});
  const d=await r.json();
  if(d.ok){
    TOK=d.token;
    localStorage.setItem('gv_tok',TOK);
    localStorage.setItem('gv_nombre',d.nombre);
    document.getElementById('user-label').textContent=d.nombre;
    document.getElementById('user-initial').textContent=(d.nombre||'?')[0].toUpperCase();
    launchApp();
  }else{err.textContent='Usuario o contrasena incorrectos';}
}

function doLogout(){TOK='';localStorage.removeItem('gv_tok');document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';}
function launchApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';loadStats();loadC();loadV();loadL();}

async function loadStats(){const d=await api('/api/stats');if(!d)return;document.getElementById('stat-comprados').textContent=d.comprados;document.getElementById('stat-vendidos').textContent=d.vendidos;document.getElementById('stat-clientes').textContent=d.clientes;}
async function loadC(){const d=await api('/api/compras?limit=5000');if(!d)return;allC=d.data||[];fC=allC;pC=1;document.getElementById('count-compras').textContent=allC.length+' registros';renderC();}
async function loadV(){const d=await api('/api/ventas?limit=5000');if(!d)return;allV=d.data||[];fV=allV;pV=1;document.getElementById('count-ventas').textContent=allV.length+' registros';renderV();}
async function loadL(){const d=await api('/api/clientes?limit=5000');if(!d)return;allL=d.data||[];fL=allL;pL=1;document.getElementById('count-clientes').textContent=allL.length+' registros';renderL();}

function filterC(){const q=document.getElementById('search-compras').value.toLowerCase();fC=q?allC.filter(r=>['proveedor','comprobante','marca','modelo','chasis','detalle'].some(k=>(r[k]||'').toLowerCase().includes(q))):allC;pC=1;renderC();}
function filterV(){const q=document.getElementById('search-ventas').value.toLowerCase();fV=q?allV.filter(r=>['cliente','detalle','comprobante','marca','modelo','chasis'].some(k=>(r[k]||'').toLowerCase().includes(q))):allV;pV=1;renderV();}
function filterL(){const q=document.getElementById('search-clientes').value.toLowerCase();fL=q?allL.filter(r=>['nombre','documento'].some(k=>(r[k]||'').toLowerCase().includes(q))):allL;pL=1;renderL();}

function pg(arr,p){const tot=arr.length,pages=Math.max(1,Math.ceil(tot/PS)),cur=Math.min(p,pages);return{rows:arr.slice((cur-1)*PS,cur*PS),page:cur,pages,tot};}
function pagHTML(p,pages,tot,fn){if(pages<=1)return '<span>'+tot+' registros</span>';let b='<button class="page-btn" onclick="'+fn+'('+(p-1)+')" '+(p>1?'':'disabled')+'>&#8592;</button>';const lo=Math.max(1,p-2),hi=Math.min(pages,p+2);if(lo>1)b+='<button class="page-btn" onclick="'+fn+'(1)">1</button>'+(lo>2?'<span style="padding:0 4px">...</span>':'');for(let i=lo;i<=hi;i++)b+='<button class="page-btn'+(i===p?' active-pg':'')+'" onclick="'+fn+'('+i+')">'+i+'</button>';if(hi<pages)b+=(hi<pages-1?'<span style="padding:0 4px">...</span>':'')+'<button class="page-btn" onclick="'+fn+'('+pages+')">'+pages+'</button>';b+='<button class="page-btn" onclick="'+fn+'('+(p+1)+')" '+(p<pages?'':'disabled')+'>&#8594;</button>';return '<span>'+tot+' registros</span><div class="page-btns">'+b+'</div>';}

function fmtD(s){return s?(s+'').substring(0,10):'-';}
function fmtU(v){return(v||v===0)?'$'+Number(v).toLocaleString('en-US',{maximumFractionDigits:0}):'-';}
function badgeDoc(t){if(!t)return '';const tl=t.toUpperCase();if(tl==='RUT')return '<span class="badge-rut">RUT</span>';if(tl==='CI')return '<span class="badge-ci">CI</span>';return '<span class="badge-pas">'+t+'</span>';}

function parseDetVenta(det){
  // Extrae marca, modelo, motor, chasis del detalle de venta
  if(!det||det.startsWith('Doc:')) return {marca:'-',modelo:'-',motor:'-',chasis:'-'};
  const d=det.toUpperCase();
  // Motor
  let motor='-';
  const mM=det.match(/MOTOR[:\s]+([A-Z0-9\-]+)/i);
  if(mM) motor=mM[1];
  // Chasis
  let chasis='-';
  const mC=det.match(/CHASIS[:\s]+([A-Z0-9\-]+)/i);
  if(mC) chasis=mC[1];
  // Marca y modelo: todo antes de MOTOR o CHASIS
  let base=det.replace(/MOTOR[:\s]+[A-Z0-9\-]+/i,'').replace(/CHASIS[:\s]+[A-Z0-9\-]+/i,'').trim().replace(/\s+/g,' ').trim();
  // Primera palabra = marca
  const parts=base.split(' ');
  const marca=parts[0]||'-';
  const modelo=parts.slice(1).join(' ')||'-';
  return {marca,modelo,motor,chasis};
}
function openModal(r,tipo){
  let fields,title;
  if(tipo==='venta'){ fields=[ {l:'Fecha',v:fmtD(r.fecha)}, {l:'Comprobante',v:r.comprobante||'-'}, {l:'Cliente',v:r.cliente||'-'}, {l:'Precio USD',v:fmtU(r.precio_usd)}, {l:'Marca',v:r.marca||'-'}, {l:'Modelo',v:r.modelo||'-'}, {l:'Motor',v:r.motor||'-'}, {l:'Chasis',v:r.chasis||'-'}, ]; title=r.marca?(r.marca+(r.modelo?' '+r.modelo:'')).trim():(r.cliente||'Venta');} else {
    fields=[
      {l:'Fecha',v:fmtD(r.fecha)},
      {l:'Proveedor',v:r.proveedor||'-'},
      {l:'Comprobante',v:r.comprobante||'-'},
      {l:'Precio USD',v:fmtU(r.precio_usd)},
      {l:'Marca',v:r.marca||'-'},
      {l:'Modelo',v:r.modelo||'-'},
      {l:'AÃÂÃÂ±o',v:r.anio||'-'},
      {l:'Chasis',v:r.chasis||'-'},
      {l:'Motor',v:r.motor||'-'},
      {l:'Color',v:r.color||'-'},
    ];
    title=(r.marca||'')+(r.modelo?' '+r.modelo:'');
  }
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=
    fields.map(f=>'<div class="modal-field"><label>'+f.l+'</label><p>'+f.v+'</p></div>').join('')+
    (r.detalle&&!r.detalle.startsWith('Doc:')?'<div class="modal-field full"><label>Detalle</label><div class="modal-detalle">'+r.detalle+'</div></div>':'');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function renderC(){
  const {rows,page,pages,tot}=pg(fC,pC);pC=page;
  document.getElementById('tbody-compras').innerHTML=rows.length
    ?rows.map(r=>'<tr onclick=\'openModal('+JSON.stringify(r).replace(/'/g,"\\'")+')\'>'
      +'<td>'+fmtD(r.fecha)+'</td>'
      +'<td>'+(r.proveedor||'-')+'</td>'
      +'<td class="mono">'+(r.comprobante||'-')+'</td>'
      +'<td><b>'+(r.marca||'-')+'</b> '+(r.modelo||'')+'</td>'
      +'<td>'+(r.anio||'-')+'</td>'
      +'<td class="mono">'+(r.chasis||'-')+'</td>'
      +'<td><div class="cell-cut">'+(r.color||'-')+'</div></td>'
      +'<td class="price">'+fmtU(r.precio_usd)+'</td>'
      +'</tr>').join('')
    :'<tr class="empty-row"><td colspan="8">Sin registros</td></tr>';
  document.getElementById('pag-compras').innerHTML=pagHTML(page,pages,tot,'goC');
}

function renderV(){ const {rows,page,pages,tot}=pg(fV,pV);pV=page; document.getElementById('tbody-ventas').innerHTML=rows.length ?rows.map(r=>'<tr onclick='openModal('+JSON.stringify(r).replace(/'/g,"\'")+',\"venta\")'>'
      +'<td>'+fmtD(r.fecha)+'</td>'
      +'<td>'+(r.cliente||'-')+'</td>'
      +'<td class="mono">'+(r.comprobante||'-')+'</td>'
      +'<td><b>'+(r.marca||'')+'</b>'+(r.modelo?' '+r.modelo:'')+'</td>'
      +'<td class="mono">'+(r.chasis||'-')+'</td>'
      +'<td class="price">'+fmtU(r.precio_usd)+'</td>'
      +'</tr>').join('') :'<tr class="empty-row"><td colspan="6">Sin registros</td></tr>'; document.getElementById('pag-ventas').innerHTML=pagHTML(page,pages,tot,'goV'); } function renderL(){
  const {rows,page,pages,tot}=pg(fL,pL);pL=page;
  document.getElementById('tbody-clientes').innerHTML=rows.length
    ?rows.map(r=>'<tr>'
      +'<td><b>'+(r.nombre||'-')+'</b></td>'
      +'<td>'+badgeDoc(r.tipo_doc)+'</td>'
      +'<td class="mono">'+(r.documento||'-')+'</td>'
      +'<td>'+(r.telefono||'-')+'</td>'
      +'<td>'+(r.email||'-')+'</td>'
      +'<td>'+(r.pais||'-')+'</td>'
      +'</tr>').join('')
    :'<tr class="empty-row"><td colspan="6">Sin registros</td></tr>';
  document.getElementById('pag-clientes').innerHTML=pagHTML(page,pages,tot,'goL');
}

function goC(p){pC=p;renderC();scrollTo(0,0);}
function goV(p){pV=p;renderV();scrollTo(0,0);}
function goL(p){pL=p;renderL();scrollTo(0,0);}

function showSection(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  btn.classList.add('active');
}

document.getElementById('inp-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('inp-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-pass').focus();});

if(TOK){api('/api/stats').then(d=>{if(d){const n=localStorage.getItem('gv_nombre')||'Usuario';document.getElementById('user-label').textContent=n;document.getElementById('user-initial').textContent=n[0].toUpperCase();launchApp();}else doLogout();});}
</script>
</body>
