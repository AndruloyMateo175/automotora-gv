function addLog(msg, cls='info'){
  const d=document.getElementById('log');
  d.innerHTML+=`<div class="${cls}">${new Date().toLocaleTimeString()} ${msg}</div>`;
  d.scrollTop=d.scrollHeight;
}
function setStatus(msg){document.getElementById('statusMsg').textContent=msg;}
function setBar(n){document.getElementById('bar').value=n;}

async function importar(tipo, datos, tok){
  let ok=0;
  for(let i=0;i<datos.length;i+=100){
    const lote=datos.slice(i,i+100);
    const r=await fetch('/api/import',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},body:JSON.stringify({tipo,registros:lote})});
    const d=await r.json();
    if(d.error) throw new Error(tipo+': '+d.error);
    ok+=lote.length;
    addLog(`  ${tipo}: ${ok}/${datos.length}`,'info');
  }
  return ok;
}

async function run(){
  const f=document.getElementById('fCompras').files[0];
  if(!f){alert('Seleccioná compras_data.json primero');return;}
  document.getElementById('btn').disabled=true;
  document.getElementById('progCard').style.display='block';
  try{
    addLog('Leyendo archivo...','info');
    const compras=JSON.parse(await f.text());
    addLog(`✓ ${compras.length} compras cargadas`,'ok');
    setBar(5);
    
    addLog('Iniciando sesión...','info');
    const lr=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:'aacosta',password:'cincoestrellas'})});
    const ld=await lr.json();
    if(!ld.token) throw new Error('Login fallido');
    const T=ld.token;
    addLog('✓ Sesión iniciada','ok');
    setBar(10);
    
    setStatus('Importando compras...');
    await importar('compras',compras,T);
    addLog(`✓ ${compras.length} compras importadas`,'ok');
    setBar(40);
    
    setStatus('Importando clientes...');
    await importar('clientes',C,T);
    addLog(`✓ ${C.length} clientes importados`,'ok');
    setBar(65);
    
    setStatus('Importando ventas...');
    await importar('ventas',V,T);
    addLog(`✓ ${V.length} ventas importadas`,'ok');
    setBar(95);
    
    const sr=await fetch('/api/stats',{headers:{'Authorization':'Bearer '+T}});
    const stats=await sr.json();
    setBar(100);
    setStatus('Completo');
    
    document.getElementById('done').style.display='block';
    document.getElementById('statsDiv').innerHTML=
      `<b>Comprados: ${stats.comprados} | Vendidos: ${stats.vendidos} | Clientes: ${stats.clientes}</b>`;
    addLog('🎉 Todo importado correctamente','ok');
    
  }catch(e){
    setStatus('Error: '+e.message);
    addLog('❌ '+e.message,'err');
    document.getElementById('btn').disabled=false;
  }
}
