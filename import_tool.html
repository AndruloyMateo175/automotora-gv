<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><title>GV Import</title>
<style>
body{font-family:Arial,sans-serif;max-width:500px;margin:60px auto;padding:20px;background:#1a1a2e;color:#fff}
h2{color:#f0a500}
.card{background:#16213e;border-radius:10px;padding:24px;margin:16px 0}
input[type=file]{width:100%;padding:10px;border:2px dashed #f0a500;border-radius:6px;cursor:pointer;box-sizing:border-box;background:#0f3460;color:#fff}
button{width:100%;background:#f0a500;color:#000;border:none;padding:14px;font-size:16px;border-radius:6px;cursor:pointer;font-weight:bold;margin-top:12px}
button:disabled{background:#555;color:#999}
progress{width:100%;height:12px;margin:8px 0;accent-color:#f0a500}
#log{background:#000;color:#0f0;padding:12px;border-radius:4px;font-family:monospace;font-size:12px;max-height:180px;overflow-y:auto;margin-top:10px}
.ok{color:#4f4}.err{color:#f44}
#done{display:none;background:#1a3a1a;border:2px solid #4f4;border-radius:8px;padding:16px;text-align:center;font-size:18px;font-weight:bold;color:#4f4;margin-top:16px}
</style></head>
<body>
<h2>🚗 AutomotoraGV — Import</h2>
<div class="card">
<p>Seleccioná <b>compras_data.json</b> — ventas y clientes ya están embebidos.</p>
<input type="file" id="f" accept=".json">
<button id="btn" onclick="run()">▶ Importar todo</button>
</div>
<div class="card" id="pc" style="display:none">
<div id="msg" style="font-weight:bold;margin-bottom:6px">Iniciando...</div>
<progress id="bar" value="0" max="100"></progress>
<div id="log"></div>
</div>
<div id="done">✅ Importación completa — <span id="stats"></span></div>
<script>
function log(m,c=''){const el=document.getElementById('log');el.innerHTML+='<div class="'+c+'">'+m+'</div>';el.scrollTop=9999;}
function bar(n){document.getElementById('bar').value=n;document.getElementById('msg').textContent=n+'%';}
async function imp(tipo,data,T){
  for(let i=0;i<data.length;i+=100){
    const r=await fetch('/api/import',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+T},body:JSON.stringify({tipo,registros:data.slice(i,i+100)})});
    const d=await r.json();
    if(!d.ok) throw new Error('Error importando '+tipo+' lote '+(i/100+1));
    log('✓ '+tipo+' '+(i+Math.min(100,data.length-i))+'/'+data.length,'ok');
    bar(Math.round((i+100)/data.length*100));
  }
}
async function run(){
  const f=document.getElementById('f').files[0];
  if(!f){alert('Seleccioná compras_data.json');return;}
  document.getElementById('btn').disabled=true;
  document.getElementById('pc').style.display='block';
  try{
    log('Leyendo archivo...');
    const compras=JSON.parse(await f.text());
    log('✓ '+compras.length+' compras leidas','ok'); bar(5);
    log('Login...');
    const lr=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:'aacosta',password:'cincoestrellas'})});
    const ld=await lr.json();
    if(!ld.ok) throw new Error('Login fallido');
    const T=ld.token;
    log('✓ Login OK','ok'); bar(10);
    log('Importando compras...');
    await imp('compras',compras,T); bar(60);
    const s=await fetch('/api/stats',{headers:{'Authorization':'Bearer '+T}}).then(r=>r.json());
    bar(100);
    document.getElementById('done').style.display='block';
    document.getElementById('stats').textContent='Comprados:'+s.comprados+' Vendidos:'+s.vendidos+' Clientes:'+s.clientes;
    log('🎉 Listo!','ok');
  }catch(e){log('❌ '+e.message,'err');document.getElementById('btn').disabled=false;}
}
</script>
</body></html>
